<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Ch03 - Q&A</title>
<style>
:root {
  --bg-primary: #0F0F1A;
  --bg-secondary: #1A1A2E;
  --bg-card: #16213E;
  --accent-indigo: #6C63FF;
  --accent-teal: #00D4AA;
  --accent-coral: #FF6B6B;
  --text-primary: #FFFFFF;
  --text-secondary: #A0AEC0;
  --text-muted: #718096;
}
html { background: var(--bg-primary); }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; color: var(--text-primary); display: flex; flex-direction: column; overflow: hidden; }
h2 { font-size: 24pt; font-weight: 700; margin: 0 0 16pt 0; }
p  { font-size: 10pt; line-height: 1.45; margin: 0 0 3pt 0; }
.qa-slide { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60pt; flex: 1; }
.qa-question { font-size: 14pt; color: var(--text-secondary); margin-top: 12pt; font-style: italic; }
.qa-topics { display: flex; gap: 10pt; margin-top: 20pt; flex-wrap: wrap; justify-content: center; }
.qa-topic { background: var(--bg-card); border-radius: 4pt; padding: 6pt 12pt; font-size: 9pt; color: var(--accent-teal); }
</style>
</head>
<body>
<div class="qa-slide">
  <h2 style="color:var(--accent-indigo);">Q &amp; A</h2>
  <p class="qa-question">"ML 分类器的误报率如何权衡?"</p>
  <p style="font-size:10pt; color:var(--text-muted); margin-top:8pt;">宁可误拒不误放 (fail-closed) -- 用户可手动 override</p>
  <div class="qa-topics">
    <div class="qa-topic"><p style="font-size:9pt; color:var(--accent-teal); margin:0;">3-Tier Pipeline</p></div>
    <div class="qa-topic"><p style="font-size:9pt; color:var(--accent-teal); margin:0;">2-Stage Classifier</p></div>
    <div class="qa-topic"><p style="font-size:9pt; color:var(--accent-teal); margin:0;">Rule DSL</p></div>
    <div class="qa-topic"><p style="font-size:9pt; color:var(--accent-teal); margin:0;">Safety Immunity</p></div>
    <div class="qa-topic"><p style="font-size:9pt; color:var(--accent-teal); margin:0;">Circuit Breaker</p></div>
  </div>
</div>
</body>
</html>

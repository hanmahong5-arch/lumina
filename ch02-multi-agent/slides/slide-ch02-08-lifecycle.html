  --bg-card: #16213E;
  --bg-code: #0D1117;
  --accent-indigo: #6C63FF;
  --accent-teal: #00D4AA;

html { background: var(--bg-primary); }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; color: var(--text-primary); display: flex; flex-direction: column; overflow: hidden; }

.page-num { font-size: 8pt; color: var(--text-muted); margin: 0; }
.slide-content { flex: 1; display: flex; flex-direction: column; padding: 10pt 28pt 4pt 28pt; }

.step-item { display: flex; gap: 6pt; align-items: flex-start; }
.step-num { font-size: 11pt; font-weight: 700; color: var(--accent-indigo); min-width: 16pt; margin: 0; }
.step-content { flex: 1; background: var(--bg-card); border-radius: 3pt; padding: 3pt 8pt; }
.step-title { font-size: 9pt; font-weight: 700; margin: 0; }
.step-desc { font-size: 8pt; color: var(--text-secondary); margin: 0; }
.slide-footer { display: flex; justify-content: space-between; align-items: center; padding: 2pt 32pt 4pt 32pt; font-size: 7pt; color: var(--text-muted); }
.slide-content-compact{flex:1;display:flex;flex-direction:column;padding:18pt 28pt 12pt 28pt}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Chapter 00 - Cover</title>
<style>
:root{--bg-primary:#0F0F1A;--bg-secondary:#1A1A2E;--bg-card:#16213E;--accent-indigo:#6C63FF;--accent-teal:#00D4AA;--accent-coral:#FF6B6B;--accent-amber:#FFB84D;--text-primary:#FFFFFF;--text-secondary:#A0AEC0;--text-muted:#718096}
html{background:var(--bg-primary)}
body{width:720pt;height:405pt;margin:0;padding:0;font-family:Arial,sans-serif;color:var(--text-primary);display:flex;flex-direction:column;overflow:hidden}
.chapter-cover{display:flex;flex-direction:column;justify-content:center;padding:46pt 60pt;flex:1}
.chapter-number{font-size:56pt;font-weight:700;color:var(--accent-indigo);opacity:0.25;margin:0;line-height:1}
.chapter-cover h1{font-size:27pt;margin:8pt 0 6pt 0;font-weight:700;line-height:1.2}
.subtitle{font-size:12pt;color:var(--text-secondary);margin:0}
.split-row{display:flex;gap:14pt;margin:18pt 0 0 0}
.split-card{flex:1;background:var(--bg-card);border-radius:4pt;padding:9pt 12pt}
.split-card h4{font-size:10pt;font-weight:700;margin:0 0 2pt 0}
.split-card p{font-size:9pt;color:var(--text-secondary);margin:0;line-height:1.4}
.question{font-size:10.5pt;color:var(--accent-amber);margin-top:16pt;font-style:italic}
</style>
</head>
<body>
<div class="chapter-cover">
  <p class="chapter-number">00</p>
  <h1>架构总览：The Rust + JS Split</h1>
  <p class="subtitle">Codex CLI 源码级拆解 · 第 0 章 · 框架篇</p>
  <div class="split-row">
    <div class="split-card">
      <h4 style="color:var(--accent-coral);">Claude Code</h4>
      <p>TypeScript 端到端 · 内嵌引擎 · npm 分发</p>
    </div>
    <div class="split-card" style="border:1.5pt solid var(--accent-indigo);">
      <h4 style="color:var(--accent-teal);">Codex CLI</h4>
      <p>Rust 核心（85+ crate）+ JS 薄壳 · 独立二进制</p>
    </div>
  </div>
  <p class="question">同一个产品类别，一个团队选了 Rust，一个选了 TypeScript——为什么？</p>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>Ch04 - Cover</title>
<style>
:root {

.chapter-cover { display: flex; flex-direction: column; justify-content: center; padding: 50pt 60pt; flex: 1; }
.chapter-number { font-size: 56pt; font-weight: 700; color: var(--accent-indigo); opacity: 0.2; margin: 0; line-height: 1; }
.divider { width: 60pt; height: 3pt; background: var(--accent-teal); margin: 12pt 0; }

</head>
<body>
<div class="chapter-cover">
  <p class="chapter-number">04</p>

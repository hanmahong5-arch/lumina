<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<title>Ch7 - Q&amp;A</title>
<style>
:root{--bg-primary:#0F0F1A;--bg-card:#16213E;--accent-indigo:#6C63FF;--accent-teal:#00D4AA;--text-primary:#FFFFFF;--text-secondary:#A0AEC0;--text-muted:#718096}
html{background:var(--bg-primary)}body{width:720pt;height:405pt;margin:0;padding:0;font-family:Arial,sans-serif;color:var(--text-primary);display:flex;flex-direction:column;overflow:hidden}
h2{font-size:24pt;font-weight:700;margin:0 0 16pt 0;line-height:1.2}
p{font-size:10pt;line-height:1.45;margin:0 0 3pt 0}
</style></head><body>
<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:60pt;flex:1;background:var(--bg-primary);">
  <h2 style="color:var(--accent-indigo);">Q &amp; A</h2>
  <p style="font-size:14pt;color:var(--text-secondary);margin-bottom:20pt;">文件系统记忆的扩展性上限在哪?</p>
  <p style="font-size:10pt;color:var(--text-muted);margin-bottom:24pt;">Where is the scalability ceiling for filesystem-based memory?</p>
  <div style="display:flex;gap:12pt;">
    <div style="background:var(--bg-card);border-radius:5pt;padding:10pt 16pt;">
      <p style="font-size:9pt;color:var(--accent-teal);margin:0;">200 files per scope</p>
    </div>
    <div style="background:var(--bg-card);border-radius:5pt;padding:10pt 16pt;">
      <p style="font-size:9pt;color:var(--accent-indigo);margin:0;">25KB entrypoint limit</p>
    </div>
    <div style="background:var(--bg-card);border-radius:5pt;padding:10pt 16pt;">
      <p style="font-size:9pt;color:var(--accent-teal);margin:0;">~$0.001 per retrieval</p>
    </div>
  </div>
</div>
</body></html>
